<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DYComment</title>
    <link rel="stylesheet" href="/styles.css" />
</head>
<body>
    <main class="page-shell">
        <section class="hero-panel">
            <div class="brand-row">
                <div class="brand-mark">DY</div>
                <div>
                    <p class="eyebrow">Douyin</p>
                    <h1>Bình luận đã dịch</h1>
                </div>
            </div>
        </section>

        <section class="tool-panel">
            <div class="auth-row">
                <div class="auth-summary">
                    <p class="auth-label">Phiên người dùng</p>
                    <p id="authStatusText" class="auth-value">Đang kiểm tra cookie...</p>
                </div>
                <button id="clearSessionButton" type="button" class="secondary-button" hidden>
                    Xóa phiên
                </button>
            </div>

            <div id="authActions" class="auth-actions">
                <button id="autoLoginButton" type="button">Lấy cookie tự động</button>
                <button id="manualCookieButton" type="button" class="secondary-button">Dán cookie thủ công</button>
            </div>

            <section id="loginFlowPanel" class="login-flow-panel" hidden>
                <div class="login-flow-head">
                    <p id="loginFlowStatus" class="login-flow-status">Đang mở Douyin...</p>
                    <button id="cancelLoginFlowButton" type="button" class="secondary-button">Đóng</button>
                </div>

                <div class="remote-browser">
                    <img id="loginFlowScreenshot" alt="Phiên đăng nhập Douyin" />
                </div>

                <div class="remote-controls">
                    <input
                        id="loginFlowTextInput"
                        type="text"
                        autocomplete="off"
                        placeholder="Nhập số điện thoại, mã SMS hoặc nội dung cần gửi"
                    />
                    <button id="sendLoginFlowTextButton" type="button">Gửi chữ</button>
                    <button type="button" class="secondary-button login-key-button" data-key="Enter">Enter</button>
                    <button type="button" class="secondary-button login-key-button" data-key="Backspace">Xóa</button>
                </div>
            </section>

            <form id="cookieForm" class="cookie-form" hidden>
                <label class="field-block" for="cookieText">
                    <span>Cookie Douyin</span>
                    <textarea
                        id="cookieText"
                        name="cookieText"
                        autocomplete="off"
                        spellcheck="false"
                        placeholder="sessionid=...; sid_guard=...; passport_auth_status=..."
                    ></textarea>
                </label>
                <button id="syncCookiesButton" type="submit">Lưu phiên Douyin</button>
                <p class="privacy-note">
                    Cookie chỉ dùng trong phiên hiện tại để gọi Douyin thay mặt trình duyệt của bạn.
                </p>
            </form>

            <form id="commentForm" class="tool-form">
                <label class="field-block" for="videoUrl">
                    <span>Link video</span>
                    <input
                        id="videoUrl"
                        name="videoUrl"
                        type="url"
                        required
                        value="https://www.douyin.com/jingxuan?modal_id=7623466763384016163"
                        placeholder="Link douyin.com, iesdouyin.com hoặc v.douyin.com"
                    />
                </label>

                <label class="field-block" for="translationMode">
                    <span>Dịch bằng</span>
                    <select id="translationMode" name="translationMode">
                        <option value="stv" selected>SangTacViet API</option>
                        <option value="offline">Offline dictionary</option>
                        <option value="gemini">Gemini API</option>
                    </select>
                </label>

                <label class="field-block" for="commentLimit">
                    <span>Mỗi lần tải</span>
                    <input
                        id="commentLimit"
                        name="commentLimit"
                        type="number"
                        min="1"
                        max="100"
                        value="20"
                    />
                </label>

                <button id="submitButton" type="submit">Lấy comment</button>
            </form>

            <div id="statusBox" class="status-box idle">Sẵn sàng.</div>
        </section>

        <section class="result-panel">
            <div class="result-header">
                <div>
                    <p class="result-label">Bình luận</p>
                    <h2 id="resultTitle">Chưa có dữ liệu</h2>
                </div>
                <div id="resultMeta" class="result-meta"></div>
            </div>

            <div id="commentList" class="comment-list empty">
                Sync cookie Douyin để bắt đầu.
            </div>
        </section>
    </main>

    <script type="module" src="/app.js"></script>
</body>
</html>
